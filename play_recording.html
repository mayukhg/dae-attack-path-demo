<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent DAE CXO Recording Player</title>
    <style>
        body { 
           background: #0b0f19; 
           color: white; 
           display: flex; 
           flex-direction: column; 
           align-items: center; 
           justify-content: center; 
           margin: 0; 
           padding: 40px;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        h2 { margin-bottom: 24px; color: #f8fafc; font-weight: 400; letter-spacing: 1px; }
        .video-container {
           max-width: 90vw; 
           background: rgba(15,23,42,0.8);
           padding: 12px;
           border: 1px solid rgba(255,255,255,0.1); 
           border-radius: 16px; 
           box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
           display: flex;
           justify-content: center;
        }
        img { 
           width: 100%; 
           height: auto; 
           border-radius: 8px; 
        }
        .footer-note {
           color: #64748b; 
           margin-top: 24px; 
           font-size: 13px;
        }
    </style>
</head>
<body>
    <h2>CXO Agentic Flow Recording</h2>
    <div class="video-container">
        <img src="cxo_agent_flow_demo.webp" alt="Recording Video" />
    </div>
    <div class="footer-note">WebP Animation Format • Automatically Looping</div>
</body>
</html>
